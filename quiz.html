<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pattaya Aviation Trivia Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f0efe9;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px;}
.page{max-width:580px;width:100%;padding-bottom:40px;}
.header{background:#185FA5;border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:14px;}
.logo-circle{width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff;}
.logo-circle img{width:100%;height:100%;object-fit:cover;display:block;}
.header-title{font-size:17px;font-weight:600;color:#fff;margin:0 0 3px;}
.header-sub{font-size:11px;color:#85B7EB;margin:0;letter-spacing:1px;}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.prog-bg{flex:1;height:6px;background:#D3D1C7;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#185FA5;border-radius:99px;transition:width 0.4s;}
.prog-lbl{font-size:12px;color:#888;white-space:nowrap;}
.q-card{background:#fff;border:1px solid #e0dfd8;border-radius:16px;padding:1.25rem 1.5rem;}
.q-badge{font-size:10px;font-weight:600;letter-spacing:2px;color:#185FA5;background:#E6F1FB;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;}
.q-en{font-size:15px;font-weight:600;color:#1a1a1a;margin:0 0 4px;line-height:1.5;}
.q-th{font-size:13px;color:#666;margin:0 0 1rem;line-height:1.5;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{background:#fff;border:1px solid #d0cfc8;border-radius:8px;padding:10px 12px;font-size:13px;color:#1a1a1a;cursor:pointer;text-align:left;line-height:1.4;transition:background 0.15s,border-color 0.15s;font-family:sans-serif;}
.opt:hover:not(:disabled){background:#f5f4ee;border-color:#185FA5;}
.opt.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041;}
.opt.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F;}
.opt:disabled{cursor:default;}
.feedback{border-radius:0 8px 8px 0;padding:10px 14px;margin-top:10px;font-size:13px;line-height:1.6;display:none;border-left:3px solid;}
.feedback.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041;}
.feedback.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F;}
.next-btn{margin-top:14px;width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:sans-serif;display:none;}
.next-btn:hover{background:#0C447C;}
.result-card{background:#fff;border:1px solid #e0dfd8;border-radius:16px;padding:2rem 1.5rem;text-align:center;display:none;}
.result-logo{width:72px;height:72px;border-radius:50%;overflow:hidden;margin:0 auto 1rem;}
.result-logo img{width:100%;height:100%;object-fit:cover;}
.result-score{font-size:52px;font-weight:700;color:#185FA5;margin:0 0 4px;}
.result-stars{font-size:22px;color:#BA7517;margin:0 0 10px;letter-spacing:3px;}
.result-title{font-size:18px;font-weight:600;color:#1a1a1a;margin:0 0 8px;}
.result-desc{font-size:13px;color:#666;margin:0 0 1.25rem;line-height:1.7;}
.share-box{background:#f5f4ee;border-radius:8px;padding:12px 14px;font-size:13px;color:#555;margin-bottom:1rem;text-align:left;line-height:1.8;}
.copy-btn{width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:sans-serif;}
.copy-btn:hover{background:#0C447C;}
.restart-btn{width:100%;padding:12px;background:#fff;color:#185FA5;border:2px solid #185FA5;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;font-family:sans-serif;}
.restart-btn:hover{background:#E6F1FB;}
@media(max-width:480px){.options{grid-template-columns:1fr;}}
</style>
</head>

const ALL_Q=[
{en:"What does 'Roger' mean in aviation radio communication?",th:"'Roger' ในการสื่อสารทางวิทยุการบินหมายความว่าอะไร?",opts:["Yes, I agree","Message received","Understood and will comply","Goodbye"],optsth:["ใช่ ฉันเห็นด้วย","ได้รับสารแล้ว","เข้าใจและจะปฏิบัติตาม","ลาก่อน"],ans:1,feedEn:"'Roger' simply means the message has been received. It comes from the NATO phonetic alphabet where R = Roger (now Romeo).",feedTh:"'Roger' หมายความว่าได้รับสารแล้ว มาจาก NATO phonetic alphabet ที่ R = Roger (ปัจจุบันคือ Romeo)"},
{en:"At what altitude do most commercial planes cruise?",th:"เครื่องบินพาณิชย์ส่วนใหญ่บินระดับความสูงเท่าไหร่?",opts:["5,000-10,000 ft","15,000-25,000 ft","30,000-40,000 ft","50,000-60,000 ft"],optsth:["5,000-10,000 ฟุต","15,000-25,000 ฟุต","30,000-40,000 ฟุต","50,000-60,000 ฟุต"],ans:2,feedEn:"Most commercial flights cruise at 30,000-40,000 ft. The air is thinner, meaning less drag and better fuel efficiency.",feedTh:"เครื่องบินพาณิชย์ส่วนใหญ่บินระหว่าง 30,000-40,000 ฟุต อากาศบางกว่า ทำให้ใช้เชื้อเพลิงน้อยลง"},
{en:"What does the black box actually record?",th:"กล่องดำในเครื่องบินบันทึกอะไร?",opts:["Only pilot voice","Only flight data","Both flight data and cockpit voice","Passenger conversations"],optsth:["เฉพาะเสียงนักบิน","เฉพาะข้อมูลการบิน","ทั้งข้อมูลการบินและเสียงในห้องนักบิน","บทสนทนาผู้โดยสาร"],ans:2,feedEn:"A black box is actually 2 devices - the Flight Data Recorder (FDR) and Cockpit Voice Recorder (CVR). And it is actually bright orange, not black!",feedTh:"กล่องดำมี 2 อุปกรณ์ — บันทึกข้อมูลการบิน (FDR) และบันทึกเสียงในห้องนักบิน (CVR) และสีจริงๆ คือสีส้มสด ไม่ใช่สีดำ!"},
{en:"Where does the word Mayday come from?",th:"คำว่า Mayday มาจากไหน?",opts:["English - May holiday","French - m'aider meaning help me","German - may danger","Latin - great danger"],optsth:["ภาษาอังกฤษ — วันหยุด May","ภาษาฝรั่งเศส — m'aider แปลว่าช่วยด้วย","ภาษาเยอรมัน — อันตรายในพฤษภาคม","ภาษาละติน — อันตรายร้ายแรง"],ans:1,feedEn:"Mayday comes from the French m'aider meaning help me. Pilots say it 3 times so it is never confused with other words.",feedTh:"Mayday มาจากคำฝรั่งเศส m'aider แปลว่าช่วยด้วย นักบินพูด 3 ครั้งเพื่อป้องกันความสับสน"},
{en:"Why does an airplane window have a tiny hole at the bottom?",th:"ทำไมกระจกหน้าต่างเครื่องบินถึงมีรูเล็กๆ ด้านล่าง?",opts:["For cabin ventilation","To balance air pressure between layers","For emergency oxygen","It is just decoration"],optsth:["เพื่อระบายอากาศ","ปรับความดันระหว่างชั้นกระจก","สำหรับออกซิเจนฉุกเฉิน","แค่ตกแต่ง"],ans:1,feedEn:"Airplane windows have 3 layers. The tiny bleed hole balances pressure between the outer and middle layers so the outer pane handles all the stress.",feedTh:"กระจกเครื่องบินมี 3 ชั้น รูเล็กๆ ปรับความดันระหว่างชั้นนอกและชั้นกลาง เพื่อให้ชั้นนอกรับแรงดันแทน"},
{en:"What does Wilco mean in pilot language?",th:"Wilco ในภาษานักบินหมายความว่าอะไร?",opts:["Will contact","Will comply","Will correct","Will confirm"],optsth:["จะติดต่อ","จะปฏิบัติตาม","จะแก้ไข","จะยืนยัน"],ans:1,feedEn:"Wilco is short for Will Comply meaning the pilot understood the message and will follow the instruction.",feedTh:"Wilco ย่อมาจาก Will Comply หมายความว่านักบินเข้าใจและจะปฏิบัติตามคำสั่ง"},
{en:"What is the NATO phonetic alphabet word for the letter P?",th:"ในตัวอักษร NATO phonetic alphabet ตัว P คืออะไร?",opts:["Panama","Phoenix","Papa","Pacific"],optsth:["Panama","Phoenix","Papa","Pacific"],ans:2,feedEn:"P = Papa in the NATO phonetic alphabet. This system is used worldwide by pilots and air traffic controllers.",feedTh:"P = Papa ในระบบ NATO phonetic alphabet ใช้ทั่วโลกโดยนักบินและเจ้าหน้าที่ควบคุมการจราจรทางอากาศ"},
{en:"What does ATC stand for?",th:"ATC ย่อมาจากอะไร?",opts:["Air Traffic Control","Aviation Training Center","Aircraft Technical Check","Air Transport Command"],optsth:["Air Traffic Control","Aviation Training Center","Aircraft Technical Check","Air Transport Command"],ans:0,feedEn:"ATC stands for Air Traffic Control - the ground team that directs aircraft in the sky and on the ground to keep everyone safe.",feedTh:"ATC ย่อมาจาก Air Traffic Control — ทีมควบคุมการจราจรทางอากาศที่ดูแลความปลอดภัยของเครื่องบิน"},
{en:"What is a squawk code used for?",th:"รหัส squawk ใช้เพื่ออะไร?",opts:["Landing clearance signal","Aircraft identification on radar","Emergency beacon code","Fuel level indicator"],optsth:["สัญญาณอนุญาตลงจอด","ระบุตัวตนเครื่องบินบนเรดาร์","รหัสสัญญาณฉุกเฉิน","ตัวบอกระดับเชื้อเพลิง"],ans:1,feedEn:"A squawk code is a 4-digit number entered into a transponder so ATC can identify the aircraft on radar. Squawk 7700 means emergency!",feedTh:"รหัส squawk เป็นตัวเลข 4 หลักที่ป้อนเข้าเครื่องส่งสัญญาณเพื่อให้ ATC ระบุเครื่องบินบนเรดาร์ Squawk 7700 หมายถึงฉุกเฉิน!"},
{en:"What does Final approach mean?",th:"Final approach หมายความว่าอะไร?",opts:["The last flight of the day","Aircraft aligned with runway descending to land","Emergency landing procedure","Pilot hands over control"],optsth:["เที่ยวบินสุดท้ายของวัน","เครื่องบินเข้าแนวรันเวย์และลดระดับเพื่อลงจอด","ขั้นตอนลงจอดฉุกเฉิน","นักบินส่งมอบการควบคุม"],ans:1,feedEn:"Final approach means the aircraft is on the last straight leg before landing, aligned with the runway and descending.",feedTh:"Final approach คือเครื่องบินอยู่บนเส้นทางตรงสุดท้ายก่อนลงจอด เข้าแนวรันเวย์และกำลังลดระดับ"},
{en:"How many times must Mayday be said in an emergency call?",th:"ต้องพูด Mayday กี่ครั้งในการแจ้งเหตุฉุกเฉิน?",opts:["1 time","2 times","3 times","5 times"],optsth:["1 ครั้ง","2 ครั้ง","3 ครั้ง","5 ครั้ง"],ans:2,feedEn:"Mayday must be said exactly 3 times - Mayday Mayday Mayday - to make absolutely sure the distress signal is heard and not mistaken.",feedTh:"ต้องพูด Mayday 3 ครั้งพอดี เพื่อให้แน่ใจว่าสัญญาณฉุกเฉินได้รับการรับฟังและไม่สับสน"},
{en:"What does V1 speed mean during takeoff?",th:"ความเร็ว V1 ในการบินขึ้นหมายความว่าอะไร?",opts:["Minimum safe takeoff speed","Point of no return - cannot abort takeoff","Maximum runway speed","Landing gear retraction speed"],optsth:["ความเร็วปลอดภัยขั้นต่ำ","จุดที่ไม่สามารถยกเลิกการบินขึ้นได้","ความเร็วสูงสุดบนรันเวย์","ความเร็วสำหรับเก็บล้อ"],ans:1,feedEn:"V1 is the decision speed. If a problem occurs before V1 the pilot can abort. After V1 it is safer to continue the takeoff than to stop.",feedTh:"V1 คือความเร็วตัดสินใจ ถ้าเกิดปัญหาก่อน V1 นักบินสามารถยกเลิกได้ หลัง V1 ปลอดภัยกว่าที่จะบินขึ้นต่อ"},
{en:"What does IFR stand for?",th:"IFR ย่อมาจากอะไร?",opts:["Instrument Flight Rules","Internal Flight Regulations","Immediate Flight Response","Indicated Flight Range"],optsth:["Instrument Flight Rules","Internal Flight Regulations","Immediate Flight Response","Indicated Flight Range"],ans:0,feedEn:"IFR stands for Instrument Flight Rules - regulations for flying using only cockpit instruments, used when visibility is low.",feedTh:"IFR ย่อมาจาก Instrument Flight Rules — กฎระเบียบสำหรับการบินโดยใช้เครื่องมือในห้องนักบินเท่านั้น ใช้เมื่อทัศนวิสัยต่ำ"},
{en:"What color is a runway centerline marking?",th:"เส้นกลางรันเวย์มีสีอะไร?",opts:["Yellow","White","Orange","Blue"],optsth:["เหลือง","ขาว","ส้ม","น้ำเงิน"],ans:1,feedEn:"Runway centerlines are white dashed lines. Yellow markings are used on taxiways to guide aircraft on the ground.",feedTh:"เส้นกลางรันเวย์เป็นเส้นประสีขาว เส้นสีเหลืองใช้บน taxiway เพื่อนำทางเครื่องบินบนพื้น"},
{en:"What is a holding pattern?",th:"holding pattern คืออะไร?",opts:["Parking spot at the gate","Oval flight path to wait before landing","Emergency landing route","Pre-flight checklist routine"],optsth:["ที่จอดเครื่องบิน","เส้นทางบินรูปวงรีเพื่อรอก่อนลงจอด","เส้นทางลงจอดฉุกเฉิน","รายการตรวจสอบก่อนบิน"],ans:1,feedEn:"A holding pattern is an oval-shaped flight path used when an aircraft must wait before landing - like circling around while waiting for the runway to clear.",feedTh:"Holding pattern คือเส้นทางบินรูปวงรีที่ใช้เมื่อเครื่องบินต้องรอก่อนลงจอด เช่น วนรอจนกว่ารันเวย์จะว่าง"},
{en:"What does Pan-Pan mean in aviation?",th:"Pan-Pan ในการบินหมายความว่าอะไร?",opts:["Everything is fine","Urgent situation but not life-threatening","Full emergency - life at risk","Request to change altitude"],optsth:["ทุกอย่างปกติ","สถานการณ์เร่งด่วนแต่ไม่คุกคามชีวิต","ฉุกเฉินเต็มรูปแบบ","ขอเปลี่ยนระดับบิน"],ans:1,feedEn:"Pan-Pan signals an urgent situation that needs attention but is not immediately life-threatening. It is one level below Mayday.",feedTh:"Pan-Pan ส่งสัญญาณสถานการณ์เร่งด่วนที่ต้องให้ความสนใจ แต่ไม่คุกคามชีวิตทันที อยู่ระดับต่ำกว่า Mayday หนึ่งขั้น"},
{en:"What is a go-around in aviation?",th:"go-around ในการบินคืออะไร?",opts:["A scenic route around the city","Aborting a landing and climbing back up","A 360 degree turn in the air","Taxiing around the airport"],optsth:["เส้นทางชมวิวรอบเมือง","ยกเลิกการลงจอดและบินขึ้นใหม่","การหมุน 360 องศาในอากาศ","ขับรอบสนามบิน"],ans:1,feedEn:"A go-around is when a pilot aborts a landing and climbs back up to try again. It is a normal and safe maneuver not an emergency.",feedTh:"Go-around คือเมื่อนักบินยกเลิกการลงจอดและบินขึ้นเพื่อลองใหม่ เป็นการบินปกติที่ปลอดภัย ไม่ใช่เหตุฉุกเฉิน"},
{en:"What does the term heavy mean when ATC says Thai 456 Heavy?",th:"คำว่า heavy ใน Thai 456 Heavy หมายความว่าอะไร?",opts:["The plane is overloaded","Large aircraft creating dangerous wake turbulence","The cargo is very heavy","The plane needs extra fuel"],optsth:["เครื่องบินบรรทุกเกินพิกัด","เครื่องบินขนาดใหญ่ที่สร้างความปั่นป่วนอันตราย","สินค้ามีน้ำหนักมาก","เครื่องบินต้องการเชื้อเพลิงพิเศษ"],ans:1,feedEn:"Heavy designates large aircraft like Boeing 747 or A380 that generate powerful wake turbulence. Other aircraft must keep extra distance behind them.",feedTh:"Heavy หมายถึงเครื่องบินขนาดใหญ่ เช่น Boeing 747 หรือ A380 ที่สร้างความปั่นป่วนหลังการบินที่แรง เครื่องบินอื่นต้องเว้นระยะห่างมากขึ้น"},
{en:"What does VFR stand for?",th:"VFR ย่อมาจากอะไร?",opts:["Visual Flight Rules","Verified Flight Report","Variable Frequency Radio","Vertical Flight Ratio"],optsth:["Visual Flight Rules","Verified Flight Report","Variable Frequency Radio","Vertical Flight Ratio"],ans:0,feedEn:"VFR stands for Visual Flight Rules - the pilot navigates by looking outside the aircraft. Used when the weather is clear.",feedTh:"VFR ย่อมาจาก Visual Flight Rules — นักบินนำทางโดยมองออกนอกเครื่องบิน ใช้เมื่อสภาพอากาศดี"},
{en:"What is the purpose of flaps on an airplane wing?",th:"แผ่น flaps บนปีกเครื่องบินมีไว้เพื่ออะไร?",opts:["To steer left and right","Increase lift and drag at low speeds","To reduce fuel consumption","To cool the engines"],optsth:["เพื่อเลี้ยวซ้ายขวา","เพิ่มแรงยกและแรงต้านที่ความเร็วต่ำ","ลดการใช้เชื้อเพลิง","ระบายความร้อนเครื่องยนต์"],ans:1,feedEn:"Flaps extend from the wing to increase lift and drag at low speeds during takeoff and landing allowing the plane to fly safely at slower speeds.",feedTh:"Flaps ขยายออกจากปีกเพื่อเพิ่มแรงยกและแรงต้านที่ความเร็วต่ำระหว่างบินขึ้นและลงจอด"},
{en:"What is a transponder on an aircraft?",th:"transponder บนเครื่องบินคืออะไร?",opts:["A device that translates pilot speech","A device that sends radar identification signals","An emergency parachute system","A cockpit communication system"],optsth:["อุปกรณ์แปลเสียงนักบิน","อุปกรณ์ส่งสัญญาณระบุตัวตนบนเรดาร์","ระบบร่มชูชีพฉุกเฉิน","ระบบสื่อสารในห้องนักบิน"],ans:1,feedEn:"A transponder receives radar signals and sends back the aircraft identity and altitude helping ATC track planes on radar screens.",feedTh:"Transponder รับสัญญาณเรดาร์และส่งกลับข้อมูลตัวตนและระดับความสูง ช่วยให้ ATC ติดตามเครื่องบินบนเรดาร์"},
{en:"What is a taxiway at an airport?",th:"taxiway ที่สนามบินคืออะไร?",opts:["Area where passengers wait to board","Path connecting runway to terminals and hangars","Runway used only for training","An emergency escape road"],optsth:["พื้นที่รอขึ้นเครื่อง","เส้นทางเชื่อมรันเวย์กับอาคารผู้โดยสาร","รันเวย์ฝึกอย่างเดียว","ถนนหลบหนีฉุกเฉิน"],ans:1,feedEn:"A taxiway is the path aircraft use to travel between the runway and the terminal or hangar keeping aircraft off the active runway.",feedTh:"Taxiway คือเส้นทางที่เครื่องบินใช้เดินทางระหว่างรันเวย์กับอาคารผู้โดยสารหรือโรงเก็บเครื่องบิน"},
{en:"What does Cleared for takeoff mean?",th:"Cleared for takeoff หมายความว่าอะไร?",opts:["Plane has passed safety check","ATC has given permission to take off","Runway has been cleared of obstacles","All passengers have boarded"],optsth:["เครื่องบินผ่านการตรวจสอบ","ATC อนุญาตให้เครื่องบินบินขึ้น","รันเวย์ถูกเคลียร์แล้ว","ผู้โดยสารทั้งหมดขึ้นเครื่องแล้ว"],ans:1,feedEn:"Cleared for takeoff is the ATC instruction that gives the pilot official permission to enter the runway and begin the takeoff roll.",feedTh:"Cleared for takeoff คือคำสั่งจาก ATC ที่ให้สิทธิ์นักบินเข้าสู่รันเวย์และเริ่มบินขึ้น"},
{en:"Why do pilots dim cabin lights before a night landing?",th:"ทำไมนักบินถึงหรี่ไฟในห้องโดยสารก่อนลงจอดตอนกลางคืน?",opts:["To save electricity","So passengers can see the stars","Help eyes adjust to darkness for emergency evacuation","It is an airline tradition"],optsth:["ประหยัดไฟ","ให้ผู้โดยสารมองดาวได้","ช่วยให้ตาปรับกับความมืดกรณีต้องอพยพ","เป็นประเพณีของสายการบิน"],ans:2,feedEn:"Dimming cabin lights before landing helps passengers eyes adjust to darkness. If emergency evacuation is needed they can see better in the dark.",feedTh:"การหรี่ไฟช่วยให้ตาผู้โดยสารปรับกับความมืด หากต้องอพยพฉุกเฉินจะมองเห็นได้ดีขึ้นในที่มืด"},
{en:"What is the NATO phonetic alphabet word for the letter A?",th:"ในตัวอักษร NATO phonetic alphabet ตัว A คืออะไร?",opts:["Arrow","Alpha","Ariel","Atlas"],optsth:["Arrow","Alpha","Ariel","Atlas"],ans:1,feedEn:"A = Alpha in the NATO phonetic alphabet. The full set is used to spell out letters clearly so they are never misheard over radio.",feedTh:"A = Alpha ในระบบ NATO phonetic alphabet ใช้เพื่อสะกดตัวอักษรให้ชัดเจนทางวิทยุ"}
];

const RESULTS=[
{min:5,title:"First class passenger! / ผู้โดยสารชั้นหนึ่ง!",desc:"Perfect score! You know aviation inside out. Pattaya Aviation salutes you!<br>คะแนนเต็ม! คุณรู้เรื่องการบินดีมากเลย Pattaya Aviation ขอคารวะ!"},
{min:4,title:"Business class flyer! / นักบินชั้นธุรกิจ!",desc:"Almost perfect! You are basically a co-pilot at this point!<br>เกือบสมบูรณ์แบบ! คุณเกือบเป็นนักบินผู้ช่วยแล้วตอนนี้!"},
{min:3,title:"Economy class passenger! / ผู้โดยสารชั้นประหยัด!",desc:"Good job! A few more flights of knowledge and you will be First Class!<br>ดีมาก! เรียนรู้อีกหน่อยก็จะถึงชั้นหนึ่งแล้ว!"},
{min:0,title:"Baggage claim only! / แค่รับกระเป๋า!",desc:"Do not worry! Everyone starts somewhere. Try again and beat your friends!<br>ไม่เป็นไร! ทุกคนต้องเริ่มจากที่ไหนสักที่ ลองใหม่แล้วแข่งกับเพื่อน!"}
];

let questions=[],cur=0,score=0,answered=false;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function pick5(){questions=shuffle(ALL_Q).slice(0,5);}

function render(){
  if(cur>=5){showResult();return;}
  const q=questions[cur];
  document.getElementById("progFill").style.width=Math.round((cur/5)*100)+"%";
  document.getElementById("progLbl").textContent=cur+" / 5";
  answered=false;
  const si=shuffle([0,1,2,3]);
  const optsHtml=si.map(i=>"<button class='opt' onclick='answer("+i+")' id='opt"+i+"'><span style='font-size:13px;font-weight:600;'>"+q.opts[i]+"</span><br><span style='font-size:11px;color:#888;'>"+q.optsth[i]+"</span></button>").join("");
  document.getElementById("quizArea").innerHTML="<div class='q-card'><span class='q-badge'>Question "+(cur+1)+" of 5</span><p class='q-en'>"+q.en+"</p><p class='q-th'>"+q.th+"</p><div class='options'>"+optsHtml+"</div><div class='feedback' id='fb'></div><button class='next-btn' id='nxt' onclick='next()'>"+(cur+1<5?"Next question &rarr;":"See my result &rarr;")+"</button></div>";
}

function answer(i){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const ok=i===q.ans;
  if(ok)score++;
  document.querySelectorAll(".opt").forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.ans)b.classList.add("correct");
    else if(idx===i&&!ok)b.classList.add("wrong");
  });
  const fb=document.getElementById("fb");
  fb.className="feedback "+(ok?"correct":"wrong");
  fb.style.display="block";
  fb.innerHTML="<strong>"+(ok?"Correct! ถูกต้อง!":"Not quite! ยังไม่ถูก!")+"</strong><br>"+q.feedEn+"<br><em style='font-size:12px;'>"+q.feedTh+"</em>";
  document.getElementById("nxt").style.display="block";
}

function next(){cur++;render();}

function showResult(){
  document.getElementById("progFill").style.width="100%";
  document.getElementById("progLbl").textContent="5 / 5";
  document.getElementById("quizArea").style.display="none";
  document.getElementById("resultCard").style.display="block";
  const r=RESULTS.find(x=>score>=x.min);
  const stars="★".repeat(score)+"☆".repeat(5-score);
  document.getElementById("rScore").textContent=score+"/5";
  document.getElementById("rStars").textContent=stars;
  document.getElementById("rTitle").textContent=r.title;
  document.getElementById("rDesc").innerHTML=r.desc;
  const txt="✈️ ฉันได้ "+score+"/5 คะแนนจากแบบทดสอบ Pattaya Aviation!\n"+stars+"\n"+r.title+"\n\nI scored "+score+"/5 on the Pattaya Aviation Trivia Quiz!\nThink you can beat me? Try it! #PattayaAviation #AviationQuiz";
  document.getElementById("shareBox").innerHTML=txt.replace(/\n/g,"<br>");
  document.getElementById("copyBtn").setAttribute("data-text",txt.replace(/\n/g,"\n"));
}

function copyResult(){
  const t=document.getElementById("copyBtn").getAttribute("data-text");
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById("copyBtn");
    b.textContent="✅ Copied! Paste it on Facebook";
    setTimeout(()=>{b.textContent="🔗 Copy & share on Facebook";},2500);
  });
}

function restart(){
  cur=0;score=0;pick5();
  document.getElementById("resultCard").style.display="none";
  document.getElementById("quizArea").style.display="block";
  render();
}

pick5();render();
</script>
</body>
