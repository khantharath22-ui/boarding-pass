<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pattaya Aviation — Pilot Boarding Pass</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Courier New',monospace;background:#e8e7e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.page{max-width:560px;width:100%;}
h1{font-family:sans-serif;font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:4px;text-align:center;letter-spacing:1px;}
.sub{font-family:sans-serif;font-size:13px;color:#888;text-align:center;margin-bottom:20px;}
.input-row{display:flex;gap:8px;margin-bottom:16px;}
input{flex:1;font-size:15px;font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:2px;padding:12px 14px;border:1px solid #d0cfc8;border-radius:10px;background:#fff;outline:none;}
input:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,0.15);}
button.gen{padding:12px 22px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:14px;font-family:sans-serif;font-weight:600;cursor:pointer;white-space:nowrap;}
button.gen:hover{background:#0C447C;}
.bp{background:#185FA5;border-radius:20px;overflow:hidden;color:#fff;}
.bp-top{padding:1.25rem 1.5rem 1rem;}
.bp-head{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
.bp-logo{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff;}
.bp-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.bp-airline{font-size:10px;letter-spacing:3px;color:#85B7EB;text-transform:uppercase;margin-bottom:3px;font-family:sans-serif;}
.bp-title{font-size:20px;font-weight:700;color:#fff;letter-spacing:1px;}
.bp-route{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.bp-city{text-align:center;}
.bp-iata{font-size:36px;font-weight:700;color:#fff;line-height:1;}
.bp-cityname{font-size:9px;color:#85B7EB;letter-spacing:1px;margin-top:2px;font-family:sans-serif;}
.bp-line{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bp-dashes{width:100%;border-top:1.5px dashed #378ADD;}
.bp-plane{font-size:20px;color:#B5D4F4;}
.bp-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.bp-field label{font-size:8px;letter-spacing:2px;color:#85B7EB;display:block;margin-bottom:3px;text-transform:uppercase;font-family:sans-serif;}
.bp-field span{font-size:13px;color:#fff;font-weight:700;}
.bp-seat{background:#E6F1FB;color:#0C447C;font-size:15px;font-weight:700;border-radius:7px;padding:5px 12px;display:inline-block;letter-spacing:2px;}
.bp-div{display:flex;align-items:center;}
.bp-notch{width:26px;height:26px;border-radius:50%;background:#e8e7e0;flex-shrink:0;}
.bp-notch-line{flex:1;border-top:1.5px dashed #378ADD;}
.bp-bottom{padding:1rem 1.5rem 1.5rem;background:#0C447C;}
.bp-pax-lbl{font-size:8px;letter-spacing:2px;color:#85B7EB;margin-bottom:4px;text-transform:uppercase;font-family:sans-serif;}
.bp-pax{font-size:17px;font-weight:700;color:#fff;margin-bottom:12px;letter-spacing:2px;}
.bp-code-lbl{font-size:8px;letter-spacing:2px;color:#85B7EB;margin-bottom:8px;text-transform:uppercase;font-family:sans-serif;}
.bp-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.bp-pill{background:#185FA5;border-radius:6px;padding:5px 11px;font-size:12px;color:#E6F1FB;letter-spacing:1px;font-weight:600;}
.bp-bar{display:flex;gap:2px;align-items:flex-end;height:38px;}
.bp-bar div{background:#B5D4F4;border-radius:1px;}
.btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.btn-dl{padding:12px 20px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:14px;font-family:sans-serif;font-weight:600;cursor:pointer;}
.btn-dl:hover{background:#0C447C;}
.btn-copy{padding:12px 20px;background:#fff;color:#185FA5;border:2px solid #185FA5;border-radius:10px;font-size:14px;font-family:sans-serif;font-weight:600;cursor:pointer;}
.btn-copy:hover{background:#E6F1FB;}
.msg{font-size:12px;color:#444;margin-top:10px;font-family:sans-serif;padding:8px 12px;background:#fff;border-radius:8px;display:none;}
.placeholder{text-align:center;padding:3rem 2rem;background:#fff;border-radius:16px;border:1.5px dashed #d0cfc8;}
.placeholder p{color:#999;font-size:14px;font-family:sans-serif;margin-top:10px;}
</style>
</head>
<body>
<div class="page">
  <h1>✈ PATTAYA AVIATION</h1>
  <p class="sub">Generate your pilot boarding pass — download &amp; share!</p>
  <div class="input-row">
    <input type="text" id="nameInput" placeholder="YOUR NAME..." maxlength="20" oninput="this.value=this.value.toUpperCase()"/>
    <button class="gen" onclick="generate()">Generate ✈</button>
  </div>
  <div id="passArea">
    <div class="placeholder">
      <div style="font-size:48px;">🎫</div>
      <p>Enter your name above and press Generate!</p>
    </div>
  </div>
  <p class="msg" id="msg"></p>
</div>

          </div>
        </div>
        <div class="bp-route">
          <div class="bp-city"><div class="bp-iata">PTY</div><div class="bp-cityname">Pattaya</div></div>
          <div class="bp-line"><div class="bp-dashes"></div><span class="bp-plane">✈</span></div>
          <div class="bp-city"><div class="bp-iata">SKY</div><div class="bp-cityname">The Sky</div></div>
        </div>
        <div class="bp-fields">
          <div class="bp-field"><label>Flight</label><span>${flightNum}</span></div>
          <div class="bp-field"><label>Date</label><span>${dateStr}</span></div>
          <div class="bp-field"><label>Departs</label><span>${time}</span></div>
          <div class="bp-field"><label>Gate</label><span>${gate}</span></div>
          <div class="bp-field"><label>Class</label><span>Pilot</span></div>
          <div class="bp-field"><label>Seat</label><span class="bp-seat">${seat}</span></div>
        </div>
      </div>
      <div class="bp-div"><div class="bp-notch"></div><div class="bp-notch-line"></div><div class="bp-notch"></div></div>
      <div class="bp-bottom">
        <p class="bp-pax-lbl">Passenger / ผู้โดยสาร</p>
        <p class="bp-pax">${raw}</p>
        <p class="bp-code-lbl">Pilot code / รหัสนักบิน</p>
        <div class="bp-pills">${pillsHtml}</div>
        <div class="bp-bar">${bars}</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-dl" onclick="downloadImg()">⬇ Download Image</button>
      <button class="btn-copy" onclick="copyLink()">🔗 Copy Shareable Link</button>
    </div>
  `;
}

function downloadImg(){
  const btn=document.querySelector('.btn-dl');
  btn.textContent='⏳ Creating image...';
  btn.disabled=true;

  const card=document.getElementById('bpCard');
  const scale=3;
  const W=card.offsetWidth*scale;
  const H=card.offsetHeight*scale;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.scale(scale,scale);

  const cw=card.offsetWidth;
  const ch=card.offsetHeight;
  const r=20;

  // Background with rounded corners
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(cw-r,0);ctx.arcTo(cw,0,cw,r,r);
  ctx.lineTo(cw,ch-r);ctx.arcTo(cw,ch,cw-r,ch,r);
  ctx.lineTo(r,ch);ctx.arcTo(0,ch,0,ch-r,r);
  ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);
  ctx.closePath();
  ctx.fillStyle='#185FA5';
  ctx.fill();
  ctx.save();ctx.clip();

  // Parse actual data from DOM
  const pax=card.querySelector('.bp-pax').textContent;
  const fields=card.querySelectorAll('.bp-field span');
  const fl=fields[0].textContent,dt=fields[1].textContent,dep=fields[2].textContent,gt=fields[3].textContent,seat=fields[5].textContent;
  const pills=Array.from(card.querySelectorAll('.bp-pill')).map(p=>p.textContent);
  const iatas=card.querySelectorAll('.bp-iata');
  const cities=card.querySelectorAll('.bp-cityname');

  // TOP SECTION
  let y=22;
  // Logo circle
  const logoImg=new Image();
  logoImg.onload=()=>{
    ctx.save();ctx.beginPath();ctx.arc(36,y+16,22,0,Math.PI*2);ctx.clip();
    ctx.drawImage(logoImg,14,y-6,44,44);ctx.restore();

    // Airline text
    ctx.fillStyle='#85B7EB';ctx.font='600 9px sans-serif';ctx.letterSpacing='3px';
    ctx.fillText('PATTAYA AVIATION',70,y+8);
    ctx.fillStyle='#fff';ctx.font='bold 19px Courier New';ctx.letterSpacing='1px';
    ctx.fillText('Boarding Pass',70,y+26);

    y+=56;
    // Route
    ctx.fillStyle='#fff';ctx.font='bold 32px Courier New';ctx.textAlign='center';
    ctx.fillText(iatas[0].textContent,50,y+28);
    ctx.fillStyle='#85B7EB';ctx.font='8px sans-serif';
    ctx.fillText(cities[0].textContent.toUpperCase(),50,y+40);

    // Dashes line
    ctx.setLineDash([4,4]);ctx.strokeStyle='#378ADD';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(95,y+14);ctx.lineTo(cw-95,y+14);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#B5D4F4';ctx.font='18px sans-serif';ctx.textAlign='center';
    ctx.fillText('✈',(cw/2),y+20);

    ctx.fillStyle='#fff';ctx.font='bold 32px Courier New';ctx.textAlign='center';
    ctx.fillText(iatas[1].textContent,cw-50,y+28);
    ctx.fillStyle='#85B7EB';ctx.font='8px sans-serif';
    ctx.fillText(cities[1].textContent.toUpperCase(),cw-50,y+40);

    y+=58;
    // Fields grid
    const fieldData=[
      {l:'FLIGHT',v:fl},{l:'DATE',v:dt},{l:'DEPARTS',v:dep},
      {l:'GATE',v:gt},{l:'CLASS',v:'Pilot'},{l:'SEAT',v:seat}
    ];
    const colW=cw/3;
    fieldData.forEach((f,i)=>{
      const col=i%3,row=Math.floor(i/3);
      const fx=col*colW+16,fy=y+row*38;
      ctx.fillStyle='#85B7EB';ctx.font='600 7.5px sans-serif';ctx.textAlign='left';
      ctx.letterSpacing='2px';ctx.fillText(f.l,fx,fy+10);
      ctx.letterSpacing='0px';
      if(f.l==='SEAT'){
        ctx.fillStyle='#E6F1FB';ctx.beginPath();ctx.roundRect(fx,fy+14,52,22,6);ctx.fill();
        ctx.fillStyle='#0C447C';ctx.font='bold 13px Courier New';ctx.textAlign='left';
        ctx.fillText(f.v,fx+6,fy+29);
      } else {
        ctx.fillStyle='#fff';ctx.font='bold 13px Courier New';
        ctx.fillText(f.v,fx,fy+28);
      }
    });

    y+=82;
    // Divider with notches
    ctx.fillStyle='#e8e7e0';
    ctx.beginPath();ctx.arc(0,y,14,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cw,y,14,0,Math.PI*2);ctx.fill();
    ctx.setLineDash([4,4]);ctx.strokeStyle='#378ADD';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(20,y);ctx.lineTo(cw-20,y);ctx.stroke();
    ctx.setLineDash([]);

    // BOTTOM SECTION
    ctx.fillStyle='#0C447C';
    ctx.fillRect(0,y+14,cw,ch-y-14);

    y+=28;
    ctx.fillStyle='#85B7EB';ctx.font='600 7.5px sans-serif';ctx.textAlign='left';
    ctx.letterSpacing='2px';ctx.fillText('PASSENGER / ผู้โดยสาร',16,y);
    ctx.letterSpacing='0px';
    y+=14;
    ctx.fillStyle='#fff';ctx.font='bold 16px Courier New';ctx.textAlign='left';
    ctx.letterSpacing='2px';ctx.fillText(pax,16,y);ctx.letterSpacing='0px';

    y+=20;
    ctx.fillStyle='#85B7EB';ctx.font='600 7.5px sans-serif';
    ctx.letterSpacing='2px';ctx.fillText('PILOT CODE / รหัสนักบิน',16,y);ctx.letterSpacing='0px';

    y+=12;
    let px=16;
    pills.forEach(p=>{
      const pw=ctx.measureText(p).width+22;
      ctx.fillStyle='#185FA5';ctx.beginPath();ctx.roundRect(px,y,pw,22,6);ctx.fill();
      ctx.fillStyle='#E6F1FB';ctx.font='bold 11px Courier New';ctx.textAlign='left';
      ctx.letterSpacing='1px';ctx.fillText(p,px+8,y+15);ctx.letterSpacing='0px';
      px+=pw+6;
      if(px>cw-60){px=16;y+=28;}
    });

    y+=32;
    // Barcode
    const seed=pax.charCodeAt(0)||65;
    for(let i=0;i<42;i++){
      const h=14+Math.abs(Math.sin(i*1.3+seed)*22);
      const w=i%3===0?3:2;
      ctx.fillStyle='#B5D4F4';
      ctx.fillRect(16+i*(w+2),ch-16-Math.round(h),w,Math.round(h));
    }

    ctx.restore();

    canvas.toBlob(blob=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='boarding-pass-'+pax+'.png';
      a.click();
      btn.textContent='✅ Downloaded!';btn.disabled=false;
      setTimeout(()=>{btn.textContent='⬇ Download Image';},2500);
    },'image/png');
  };
  logoImg.onerror=()=>{
    showMsg('⚠️ Could not load logo image. Try uploading the file to a web server.');
    btn.textContent='⬇ Download Image';btn.disabled=false;
  };
  logoImg.src=LOGO_SRC;
}

function copyLink(){
  const base=window.location.href.split('?')[0];
  const link=base+'?name='+encodeURIComponent(currentName);
  navigator.clipboard.writeText(link).then(()=>{
    showMsg('✅ Link copied: '+link);
  }).catch(()=>{
    prompt('Copy this link:',window.location.href.split('?')[0]+'?name='+encodeURIComponent(currentName));
  });
}

function showMsg(t){
  const el=document.getElementById('msg');
  el.textContent=t;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},5000);
}

function autoFill(){
  const p=new URLSearchParams(window.location.search).get('name');
  if(p){document.getElementById('nameInput').value=p.toUpperCase();generate();}
}
window.addEventListener('load',autoFill);
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
</script>
</body>
</html>
